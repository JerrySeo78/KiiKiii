  <!-- Mouth -->
  <path d="M 92 118 Q 100 124 108 118" stroke="#D4737A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Name tag -->
  <rect x="65" y="158" width="70" height="22" rx="6" fill="white" opacity="0.7"/>
  <text x="100" y="174" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#8B6FBF">SUI</text>
