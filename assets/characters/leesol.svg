  <ellipse cx="100" cy="100" rx="48" ry="50" fill="#F2D4C2"/>
  <!-- Hair - long straight -->
  <ellipse cx="100" cy="60" rx="50" ry="28" fill="#1A1A2E"/>
  <ellipse cx="52" cy="102" rx="13" ry="42" fill="#1A1A2E"/>
  <ellipse cx="148" cy="102" rx="13" ry="42" fill="#1A1A2E"/>
  <rect x="52" y="70" width="96" height="32" fill="#1A1A2E"/>
