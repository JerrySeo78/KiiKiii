  <ellipse cx="88" cy="62" rx="18" ry="8" fill="#2D2D5E" opacity="0.5"/>
  <!-- Eyes -->
  <ellipse cx="84" cy="100" rx="8" ry="9" fill="white"/>
  <ellipse cx="116" cy="100" rx="8" ry="9" fill="white"/>
  <ellipse cx="86" cy="101" rx="5" ry="6" fill="#1A4A8B"/>
  <ellipse cx="118" cy="101" rx="5" ry="6" fill="#1A4A8B"/>
