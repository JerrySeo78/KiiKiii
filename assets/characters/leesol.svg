  <circle cx="119" cy="99" r="2" fill="white"/>
  <!-- Blush -->
  <ellipse cx="74" cy="112" rx="9" ry="5" fill="#FFB3C6" opacity="0.6"/>
  <ellipse cx="126" cy="112" rx="9" ry="5" fill="#FFB3C6" opacity="0.6"/>
  <!-- Mouth -->
  <path d="M 92 117 Q 100 122 108 117" stroke="#D4737A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Name tag -->
  <rect x="52" y="158" width="96" height="22" rx="6" fill="white" opacity="0.7"/>
  <text x="100" y="174" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1A4A8B">LEESOL</text>
