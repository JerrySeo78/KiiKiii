<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 600" width="390" height="600">
  <defs>
    <linearGradient id="gameBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0A2E"/>
      <stop offset="100%" style="stop-color:#1E0A4E"/>
    </linearGradient>
  </defs>
  <rect width="390" height="600" fill="url(#gameBg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="150" x2="390" y2="150" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>
  <line x1="0" y1="300" x2="390" y2="300" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>
  <line x1="0" y1="450" x2="390" y2="450" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>
  <line x1="97" y1="0" x2="97" y2="600" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>
  <line x1="195" y1="0" x2="195" y2="600" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>
  <line x1="293" y1="0" x2="293" y2="600" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>
  <!-- Decorative circles -->
  <circle cx="195" cy="300" r="180" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="2"/>
  <circle cx="195" cy="300" r="120" fill="none" stroke="rgba(236,72,153,0.06)" stroke-width="2"/>
  <circle cx="195" cy="300" r="60" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="2"/>
  <!-- Floating stars -->
  <circle cx="50" cy="80" r="2" fill="#A78BFA" opacity="0.6"/>
  <circle cx="340" cy="120" r="2" fill="#EC4899" opacity="0.6"/>
  <circle cx="80" cy="400" r="1.5" fill="#A78BFA" opacity="0.4"/>
  <circle cx="310" cy="350" r="1.5" fill="#EC4899" opacity="0.4"/>
  <circle cx="160" cy="520" r="2" fill="#A78BFA" opacity="0.5"/>
  <circle cx="250" cy="50" r="1.5" fill="#EC4899" opacity="0.5"/>
  <!-- Ground platform -->
  <rect x="0" y="520" width="390" height="80" fill="rgba(167,139,250,0.08)"/>
  <line x1="0" y1="520" x2="390" y2="520" stroke="rgba(167,139,250,0.3)" stroke-width="2"/>
</svg>
