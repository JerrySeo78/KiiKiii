<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 220" width="160" height="220">
  <defs>
    <linearGradient id="rareBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a4e"/>
      <stop offset="100%" style="stop-color:#4B0082"/>
    </linearGradient>
    <linearGradient id="rareBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="50%" style="stop-color:#EC4899"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
  </defs>
  <rect width="160" height="220" rx="16" fill="url(#rareBg)"/>
  <rect x="4" y="4" width="152" height="212" rx="13" fill="none" stroke="url(#rareBorder)" stroke-width="3"/>
  <rect x="8" y="8" width="144" height="204" rx="10" fill="none" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <!-- Sparkles -->
  <circle cx="20" cy="20" r="2" fill="#A78BFA" opacity="0.8"/>
  <circle cx="140" cy="20" r="2" fill="#EC4899" opacity="0.8"/>
  <circle cx="20" cy="200" r="2" fill="#EC4899" opacity="0.8"/>
  <circle cx="140" cy="200" r="2" fill="#A78BFA" opacity="0.8"/>
  <circle cx="80" cy="14" r="3" fill="#A78BFA" opacity="0.6"/>
  <!-- Grade badge -->
  <rect x="8" y="8" width="38" height="20" rx="6" fill="#7C3AED"/>
  <text x="27" y="22" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="white">RARE</text>
  <!-- Card content area -->
  <rect x="16" y="36" width="128" height="128" rx="8" fill="rgba(167,139,250,0.1)"/>
  <!-- Bottom info -->
  <rect x="16" y="174" width="128" height="36" rx="8" fill="rgba(167,139,250,0.1)"/>
</svg>
