<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>KiiiKiii House</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pk-light:   #FFE4F0;
      --pk-mid:     #FF6B9D;
      --pk-deep:    #E8478A;
      --purple:     #9B6DD9;
      --coral:      #FF7B54;
      --gold:       #FFB830;
      --diamond:    #7ECFFF;
      --text-dk:    #2A1A2E;
      --text-md:    #8B6B8E;
      --cream:      #FFF5FB;
      --white:      #FFFFFF;

      --header-h:   52px;
      --nav-h:      68px;
      --font-main:  'Noto Sans KR', 'Nunito', sans-serif;
      --font-sans:  'Nunito', sans-serif;
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #F0C8DE;
      font-family: var(--font-main);
      color: var(--text-dk);
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      width: 100%; max-width: 390px; height: 100dvh;
      margin: 0 auto;
      background: var(--pk-light);
      display: flex; flex-direction: column;
      position: relative; overflow: hidden;
    }

    /* ───────────────── Header ───────────────── */
    #kk-header {
      height: var(--header-h); flex-shrink: 0;
      background: var(--white);
      border-bottom: 1px solid #FFD6EC;
      display: flex; align-items: center;
      padding: 0 12px; gap: 8px;
      position: relative; z-index: 10;
    }

    /* 아바타 */
    .hd-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid var(--pk-mid);
      overflow: hidden; flex-shrink: 0;
      background: linear-gradient(135deg, var(--pk-light) 0%, #FFB8D8 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; line-height: 1;
    }

    /* LV + 캐릭터명 */
    .hd-char-info {
      display: flex; align-items: center; gap: 4px; flex-shrink: 0;
    }
    .hd-lv-badge {
      font-family: var(--font-sans);
      font-size: 9px; font-weight: 900;
      color: var(--white);
      background: linear-gradient(135deg, var(--pk-mid) 0%, var(--pk-deep) 100%);
      padding: 2px 6px; border-radius: 99px;
      letter-spacing: 0.3px;
      line-height: 1.4;
    }
    .hd-char-name {
      font-size: 12px; font-weight: 700;
      color: var(--text-dk);
      white-space: nowrap;
    }

    /* HP 하트 */
    .hd-hp {
      display: flex; align-items: center; gap: 3px; flex-shrink: 0;
    }
    .hd-hp-icon { font-size: 13px; line-height: 1; }
    .hd-hp-text {
      font-family: var(--font-sans);
      font-size: 10px; font-weight: 700;
      color: #FF4D6D;
      white-space: nowrap;
      line-height: 1.2;
    }
    .hd-hp-max {
      font-size: 9px; font-weight: 400;
      color: var(--text-md);
    }

    /* 구분선 */
    .hd-sep {
      width: 1px; height: 20px;
      background: #FFD6EC; flex-shrink: 0;
    }

    /* 코인 / 다이아 */
    .hd-currency {
      display: flex; align-items: center; gap: 3px; flex-shrink: 0;
    }
    .hd-currency-icon { font-size: 14px; line-height: 1; }
    .hd-currency-val {
      font-family: var(--font-sans);
      font-size: 11px; font-weight: 800;
      white-space: nowrap;
    }
    .hd-currency-val.coin  { color: var(--gold); }
    .hd-currency-val.dia   { color: var(--diamond); }
    .hd-plus-btn {
      width: 16px; height: 16px; border-radius: 50%;
      background: linear-gradient(135deg, var(--pk-mid) 0%, var(--pk-deep) 100%);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 900; color: var(--white);
      line-height: 1; padding: 0;
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    .hd-plus-btn:active { transform: scale(0.88); }

    /* 우측 아이콘 그룹 */
    .hd-spacer { flex: 1; }
    .hd-icons {
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .hd-icon-btn {
      width: 28px; height: 28px;
      background: var(--pk-light);
      border: 1px solid #FFD6EC;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .hd-icon-btn:active { background: #FFD6EC; }
    .hd-icon-btn .badge {
      position: absolute; top: -3px; right: -3px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--pk-deep);
      border: 1.5px solid var(--white);
    }

    /* ───────────────── Canvas ───────────────── */
    #game-container {
      flex: 1; overflow: hidden; position: relative;
      min-height: 0;
    }
    #game-container canvas {
      display: block !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: contain;
    }

    /* ───────────────── NavBar ───────────────── */
    #kk-nav {
      height: var(--nav-h); flex-shrink: 0;
      background: var(--white);
      border-top: 1px solid #FFD6EC;
      display: flex; align-items: stretch; justify-content: space-around;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      position: relative; z-index: 10;
    }

    .nav-btn {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px;
      flex: 1;
      padding: 6px 4px 4px;
      background: transparent; border: none; cursor: pointer;
      position: relative;
      font-family: var(--font-main);
      transition: all 0.18s;
      /* 상단 활성 라인 공간 */
      border-top: 2.5px solid transparent;
    }

    .nav-btn .nav-emoji { font-size: 21px; line-height: 1; }
    .nav-btn .nav-icon { width: 24px; height: 24px; object-fit: contain; opacity: 0.55; transition: opacity 0.18s; }
    .nav-btn.active .nav-icon { opacity: 1; }

    .nav-btn .nav-label {
      font-size: 10px; font-weight: 700;
      color: #C0A8C4;
      transition: color 0.18s;
      letter-spacing: -0.2px;
    }

    /* 활성 탭 */
    .nav-btn.active {
      border-top-color: var(--pk-mid);
    }
    .nav-btn.active .nav-label {
      color: var(--pk-mid);
    }
    .nav-btn.active .nav-emoji {
      animation: navPop 0.25s ease;
    }

    @keyframes navPop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.25); }
      100% { transform: scale(1); }
    }

    /* ───────────────── FTUE Screen (4-layer) ───────────────── */
    #ftue-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
    }
    #ftue-screen.visible { display: block; }

    /* Layer 1 — Background */
    #ftue-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* Content column */
    #ftue-content {
      position: absolute;
      inset: 0;
      max-width: 390px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2dvh 0 3dvh;
    }

    /* Layer 2 — Logo */
    #ftue-logo {
      width: 80%;
      height: auto;
      flex-shrink: 0;
    }

    /* Layer 3 — Member selection panel */
    #ftue-panel-wrap {
      position: relative;
      width: 100%;
      flex-shrink: 0;
      margin-top: 0.5dvh;
    }
    #ftue-panel {
      display: block;
      width: 100%;
      height: auto;
    }

    /* 카드 히트존 — ftue_panel.png(941×910) 기준 % */
    .ftue-card {
      position: absolute;
      top: 23.4%;    /* 213/910 */
      height: 72.5%; /* 660/910 */
      width: 17.8%;
      border-radius: 10px;
      cursor: pointer;
      transition: box-shadow 0.18s, transform 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .ftue-card:nth-child(2) { left:  2.1%; }
    .ftue-card:nth-child(3) { left: 21.4%; }
    .ftue-card:nth-child(4) { left: 40.6%; }
    .ftue-card:nth-child(5) { left: 59.8%; }
    .ftue-card:nth-child(6) { left: 79.1%; }
    .ftue-card.selected {
      box-shadow: 0 0 0 3px #FF6B9D, 0 0 18px rgba(255,107,157,0.6);
      transform: translateY(-5px) scale(1.04);
    }

    /* Layer 4 — Buttons */
    #ftue-btns {
      margin-top: auto;
      padding-top: 2dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .ftue-btn-wrap {
      position: relative;
      display: inline-block;
      -webkit-tap-highlight-color: transparent;
    }
    .ftue-btn-wrap img { display: block; height: auto; }
    .ftue-btn-wrap button {
      position: absolute;
      inset: 0;
      background: transparent;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #ftue-btn-start-wrap { width: 82%; opacity: 0.5; transition: opacity 0.2s; }
    #ftue-btn-start-wrap img { width: 100%; }
    #ftue-btn-start-wrap.active { opacity: 1; }
    #ftue-btn-start-wrap.active:active { transform: scale(0.97); }
    #ftue-btn-random-wrap { width: 58%; }
    #ftue-btn-random-wrap img { width: 100%; }
    #ftue-btn-random-wrap:active { transform: scale(0.96); }

    /* ───────────────── Keyframes ───────────────── */
    /* ── Boot Screen ── */
    #boot-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      pointer-events: none; /* Phaser 캔버스로 이벤트 통과 */
    }
    #boot-inner {
      position: relative;
      width: 100%;
      max-width: 390px;
      height: 100dvh;
      overflow: hidden;
      flex-shrink: 0;
      pointer-events: none;
    }
    #boot-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }
    #boot-chars {
      position: absolute;
      bottom: 6%;
      left: 50%;
      transform: translateX(-50%);
      width: 88%;
      object-fit: contain;
    }
    #boot-logo {
      position: absolute;
      top: calc(2% + 50px);
      left: 50%;
      transform: translateX(-50%) scale(1.4);
      transform-origin: top center;
      width: 90%;
      object-fit: contain;
    }
    #boot-btn-settings,
    #boot-btn-notice {
      position: absolute;
      bottom: 0;
      width: 24%;
      object-fit: contain;
    }
    #boot-btn-settings { left: 0; }
    #boot-btn-notice   { right: 0; }

    #boot-btn-start {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 54%;
      object-fit: contain;
      animation: bootFloat 2.2s ease-in-out infinite;
    }
    @keyframes bootFloat {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-9px); }
    }
    .boot-btn-flash {
      animation: bootFlash 0.45s ease forwards !important;
    }
    @keyframes bootFlash {
      0%   { filter: none; }
      25%  { filter: brightness(1.8) saturate(1.6) hue-rotate(20deg); }
      100% { filter: none; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.06); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }
  </style>
  <script type="module" crossorigin src="./assets/index-DABbN4Gw.js"></script>
</head>
<body>
<div id="app">

  <!-- ── FTUE Screen (4-layer) ── -->
  <div id="ftue-screen">
    <!-- Layer 1: Background (full-screen, object-fit cover) -->
    <img id="ftue-bg" src="./assets/ftue_bg-DyRRWlNL.png" alt="">
    <!-- Content column -->
    <div id="ftue-content">
      <!-- Layer 2: Logo -->
      <img id="ftue-logo" src="./assets/ftue_logo-Cybp-zma.png" alt="">
      <!-- Layer 3: Member selection panel + card hit zones -->
      <div id="ftue-panel-wrap">
        <img id="ftue-panel" src="./assets/ftue_panel-CIClAS-3.png" alt="">
        <div class="ftue-card" data-idx="0"></div>
        <div class="ftue-card" data-idx="1"></div>
        <div class="ftue-card" data-idx="2"></div>
        <div class="ftue-card" data-idx="3"></div>
        <div class="ftue-card" data-idx="4"></div>
      </div>
      <!-- Layer 4: Buttons -->
      <div id="ftue-btns">
        <div class="ftue-btn-wrap" id="ftue-btn-start-wrap">
          <img src="./assets/ftue_btn_start-Dh27ZKkt.png" alt="">
          <button id="ftue-btn-start"></button>
        </div>
        <div class="ftue-btn-wrap" id="ftue-btn-random-wrap">
          <img src="./assets/ftue_btn_random-U3bVjWot.png" alt="">
          <button id="ftue-btn-random"></button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Boot Screen Image ── -->
  <div id="boot-screen">
    <div id="boot-inner">
      <img id="boot-bg"      src="./assets/title_bg_final-hW2MuUZt.png" alt="">
      <img id="boot-chars"   src="./assets/title_chars_alpha-CBP80d0B.png" alt="">
      <img id="boot-logo"    src="./assets/title_logo_alpha-CYbEfooW.png" alt="">
      <img id="boot-btn-settings" src="./assets/title_btn_settings-ntOH9W-C.png" alt="">
      <img id="boot-btn-start"    src="./assets/title_btn_start-Ccl1YlVH.png" alt="">
      <img id="boot-btn-notice"   src="./assets/title_btn_notice-SZ-SRMza.png" alt="">
    </div>
  </div>

  <!-- ── Header ── -->
  <header id="kk-header">

    <!-- 아바타 -->
    <div class="hd-avatar">🐱</div>

    <!-- LV 배지 + 캐릭터명 -->
    <div class="hd-char-info">
      <span class="hd-lv-badge" id="lv-text">LV.42</span>
      <span class="hd-char-name" id="char-name">수이</span>
    </div>

    <!-- HP 하트 -->
    <div class="hd-hp">
      <span class="hd-hp-icon">❤️</span>
      <span class="hd-hp-text">
        <span id="heart-val">120</span>/<span id="hp-fill">120</span>
        <span class="hd-hp-max"> MAX</span>
      </span>
    </div>

    <div class="hd-sep"></div>

    <!-- 코인 -->
    <div class="hd-currency">
      <span class="hd-currency-icon">🪙</span>
      <span class="hd-currency-val coin" id="coin-val">38,760</span>
      <button class="hd-plus-btn" aria-label="코인 충전">+</button>
    </div>

    <!-- 다이아 -->
    <div class="hd-currency">
      <span class="hd-currency-icon">💎</span>
      <span class="hd-currency-val dia" id="diamond-val">1,250</span>
      <button class="hd-plus-btn" aria-label="다이아 충전">+</button>
    </div>

    <!-- 우측 아이콘 (구버전 호환: raffle-val 숨김 유지) -->
    <span id="raffle-val" style="display:none">0</span>
    <div class="hd-spacer"></div>
    <div class="hd-icons">
      <button class="hd-icon-btn" aria-label="메시지">
        ✉️
        <span class="badge"></span>
      </button>
      <button class="hd-icon-btn" aria-label="알림">
        🔔
        <span class="badge"></span>
      </button>
      <button class="hd-icon-btn" aria-label="설정">⚙️</button>
    </div>

  </header>

  <!-- ── Phaser canvas ── -->
  <div id="game-container"></div>

  <!-- ── NavBar (5탭) ── -->
  <nav id="kk-nav">
    <button class="nav-btn active" data-scene="HomeScene">
      <img class="nav-icon" src="./assets/icon_nav_home_active-CTaEmXja.png" alt="홈">
      <span class="nav-label">홈</span>
    </button>
    <button class="nav-btn" data-scene="MemberScene">
      <img class="nav-icon" src="./assets/icon_nav_member_inactive-CZVG7sdr.png" alt="멤버">
      <span class="nav-label">멤버</span>
    </button>
    <button class="nav-btn" data-scene="BoxScene">
      <img class="nav-icon" src="./assets/icon_nav_box_inactive-DjIdWOHS.png" alt="박스">
      <span class="nav-label">박스</span>
    </button>
    <button class="nav-btn" data-scene="ShopScene">
      <img class="nav-icon" src="./assets/icon_nav_shop_inactive-D8R_6rFG.png" alt="상점">
      <span class="nav-label">상점</span>
    </button>
    <button class="nav-btn" data-scene="MenuScene">
      <img class="nav-icon" src="./assets/icon_nav_menu_inactive-Cset9kOV.png" alt="메뉴">
      <span class="nav-label">메뉴</span>
    </button>
  </nav>

</div>
</body>
</html>
